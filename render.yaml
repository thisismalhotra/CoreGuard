# Render Blueprint — deploys Core-Guard backend + frontend from one repo.
# Docs: https://docs.render.com/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint
#   3. Connect your repo — Render auto-detects this file
#   4. Set the env vars marked "sync: false" in the Render dashboard
#
# After first deploy, update FRONTEND_URL and NEXT_PUBLIC_BACKEND_URL
# with the actual Render URLs (e.g., https://coreguard-api.onrender.com).

services:
  # --- Backend: FastAPI + Socket.io ---
  - type: web
    name: coreguard-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn main:socket_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set to your Supabase Postgres connection string
      - key: GOOGLE_CLIENT_ID
        sync: false  # From Google Cloud Console
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # From Google Cloud Console
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: FRONTEND_URL
        sync: false  # Set to https://coreguard-frontend.onrender.com after first deploy
      - key: PYTHON_VERSION
        value: "3.12.0"

  # --- Frontend: Next.js ---
  - type: web
    name: coreguard-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false  # Set to https://coreguard-api.onrender.com after first deploy
      - key: NODE_VERSION
        value: "20"
